<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Two lines diverging from center -->
  <path d="M 100 180 Q 100 100 45 30" stroke="#60a5fa" stroke-width="12" fill="none" stroke-linecap="round"/>
  <path d="M 100 180 Q 100 100 155 30" stroke="#f97316" stroke-width="12" fill="none" stroke-linecap="round"/>
  <!-- Dot at convergence point -->
  <circle cx="100" cy="180" r="8" fill="#10b981"/>
</svg>
