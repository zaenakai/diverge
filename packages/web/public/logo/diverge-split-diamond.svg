<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="leftGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="rightGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fb923c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f97316;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Left half diamond (Polymarket blue) -->
  <polygon points="100,15 20,100 100,185 100,108 55,100 100,52" fill="url(#leftGrad)" />
  <!-- Right half diamond (Kalshi orange) -->
  <polygon points="100,15 180,100 100,185 100,108 145,100 100,52" fill="url(#rightGrad)" />
</svg>
