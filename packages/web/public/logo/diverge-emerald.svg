<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="emeraldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#34d399;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Full diamond outline in emerald -->
  <polygon points="100,10 185,100 100,190 15,100" fill="none" stroke="url(#emeraldGrad)" stroke-width="8"/>
  <!-- Vertical split line -->
  <line x1="100" y1="40" x2="100" y2="160" stroke="#0a0a0a" stroke-width="10"/>
  <!-- Left half glow -->
  <polygon points="100,18 22,100 100,182" fill="#3b82f6" opacity="0.15"/>
  <!-- Right half glow -->
  <polygon points="100,18 178,100 100,182" fill="#f97316" opacity="0.15"/>
</svg>
